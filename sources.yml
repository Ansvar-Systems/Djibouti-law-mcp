# sources.yml
schema_version: "1.0"
mcp_name: "Djibouti Law MCP"
jurisdiction: "DJ"
jurisdiction_name: "Djibouti"
language: "French"

sources:
  - name: "Journal Officiel de la République de Djibouti (JORD)"
    authority: "Présidence de la République de Djibouti — Imprimerie Nationale"
    official_portal: "https://www.journalofficiel.dj"
    canonical_identifier: "journalofficiel.dj"
    retrieval_method: "WordPress REST API (JSON)"
    api_documentation: "https://www.journalofficiel.dj/wp-json/"
    update_frequency: "Per JORD issue (typically several issues per month)"
    last_ingested: "2026-04-22"
    license_or_terms:
      type: "Public record (Journal Officiel)"
      url: "https://www.journalofficiel.dj"
      summary: "Public record of the Republic. Reproduction permitted with source attribution."
    coverage:
      scope: >-
        Lois, lois organiques, lois de finances, ordonnances, décrets, arrêtés,
        décisions, délibérations, circulaires, avis, proclamations, and conventions
        published in the Journal Officiel de la République de Djibouti.
      default_natures:
        - loi
        - loi-organique
        - loi-de-finances
        - ordonnance
        - proclamation
      limitations: >-
        Digital archive coverage depends on JORD website indexing. Some legacy
        issues may be missing from the REST API; ingest mode classifies those
        as `inaccessible` in data/census.json.
    languages:
      - "fr"

